{% set name = "mpld3" %}
{% set version = "0.5.12" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 1333e2bca012ea9af3c27801ba36f65bc26540b6fad4c56a903afb19477f2c37

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed --no-cache-dir -vv

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python
    - jinja2
    - matplotlib-base

# E   ModuleNotFoundError: No module named 'diffimg'
{% set ignore_tests = "--ignore=mpld3/tests/test_d3_snapshots.py" %}
# E   ImportError: attempted relative import beyond top-level package
{% set ignore_tests = ignore_tests + " --ignore=mpld3/tests/test_plots.py" %}
{% set ignore_tests = ignore_tests + " --ignore=mpld3/tests/test_elements.py" %}
{% set ignore_tests = ignore_tests + " --ignore=mpld3/tests/test_figure.py" %}
{% set ignore_tests = ignore_tests + " --ignore=mpld3/tests/test_html.py" %}
{% set ignore_tests = ignore_tests + " --ignore=mpld3/tests/test_js_libs.py" %}
{% set ignore_tests = ignore_tests + " --ignore=mpld3/tests/test_plugin.py" %}
{% set ignore_tests = ignore_tests + " --ignore=mpld3/tests/test_show.py" %}

test:
  source_files:
    - mpld3/tests
    - mpld3/test_plots
  imports:
    - mpld3
    - mpld3._display
    - mpld3.mpld3renderer
    - mpld3.mplexporter
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -v mpld3/tests {{ ignore_tests }}
    - pytest -v mpld3/test_plots {{ ignore_tests }}
  requires:
    - pip
    - pytest

about:
  home: https://mpld3.github.io
  summary: D3 Viewer for Matplotlib.
  description: The mpld3 project brings together Matplotlib, 
    the popular Python-based graphing library, and D3js,
    the popular JavaScript library for creating interactive data visualizations for the web.
    The result is a simple API for exporting your matplotlib graphics to HTML
    code which can be used within the browser, within standard web pages, blogs, or tools such as the IPython notebook.
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  doc_url: https://mpld3.github.io
  dev_url: https://github.com/mpld3/mpld3

extra:
  recipe-maintainers:
    - etgalloway
    - jakevdp
    - ocefpaf
